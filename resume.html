        <h2>Summary</h2>
        <p>Senior software engineer with deep experience in distributed systems, event-driven architecture, and GenAI automation. Currently at Salesforce Hyperforce AI, building agentic SDLC tooling and IDE plugins. Previously <strong>nearly 6 years at Amazon (FAANG / Big Five) Finance Automation</strong> — one of the most demanding engineering environments in the industry — where he co-architected a large-scale event-driven vendor-payments platform, built a self-service rule engine, and shipped a production LLM-driven reconciliation engine. Strong hybrid profile: can both design high-throughput distributed systems and ship production GenAI inside them.</p>

        <h2>Experience</h2>
        <h3>Salesforce — Senior Software Engineer, Hyperforce AI · Nov 2025 – present · Hyderabad</h3>
        <p><strong>Agentic SDLC Tooling:</strong> Built IDE plugins, MCPs, and autonomous Agent Skills to accelerate developer productivity. Achieved almost 100% weekly AI engagement, reduced on-call incident analysis time by 5x, and cut PR review wait times by ~50%.</p>
        <p>Lead on the Core &amp; Platform Services GCP Uplift programme — porting AWS-native core services onto GCP (GKE, Cloud SQL). Stood up GCP infrastructure, ran production readiness sign-offs, coordinated upstream and downstream changes, and migrated live customers. Shipped Key Broker, DocGen, PDFGen, and other services onto GCP. Among the first AWS-to-GCP service uplifts in the platform org.</p>

        <h3>Amazon (FAANG / Big Five) — Software Development Engineer II, Finance Automation · Dec 2021 – Nov 2025 · Hyderabad (promoted from SDE I)</h3>
        <ul>
          <li>Co-lead architect on the VendorHoldbacks re-architecture — decomposed a batch SQL monolith into an event-driven microservice platform (Lambda, SQS, SNS, DynamoDB, CloudFormation). Led a team of 3. Moved payment processing from overnight batches to near real-time.</li>
          <li>Shipped an LLM-driven financial reconciliation engine — RAG pipeline over historical analyst notes, LLM-based semantic mapping for free-text fields, human-in-the-loop review. Tech: Python, LLMs, RAG, AWS Bedrock, LangChain.</li>
          <li>Led the VendorHoldbacks Rule Engine — Drools-backed rule engine with a self-service web portal for business owners; rule authoring dropped from ~4 weeks of engineering to minutes.</li>
          <li>Built a policy-based approvals / reminders email orchestrator.</li>
        </ul>

        <h3>Amazon (FAANG / Big Five) — Software Development Engineer I, Finance Automation · May 2019 – Dec 2021 · Hyderabad</h3>
        <ul>
          <li>Seasonal Holdbacks — linear-regression risk model for holdback decisions across peak-season events. Picked linear regression for explainability to finance and vendor-facing teams.</li>
          <li>Special Merchant Data Segregation — separated views, APIs, and legacy CSV/Excel reports between general vendors and special merchants across 20+ input sources; auth/validation at the API layer; config-driven new-merchant onboarding.</li>
        </ul>

        <p>C++17 HFT market-replay simulator with lock-free hot-path data structures, tuned to sub-50µs per-execution latency.</p>
